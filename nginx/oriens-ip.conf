# nginx/oriens-ip.conf
# Site do nginx NO HOST para acesso por IP (sem domínio/HTTPS ainda).
# Instalar na VPS:
#   cp /opt/oriens/nginx/oriens-ip.conf /etc/nginx/sites-available/oriens
#   nginx -t && systemctl reload nginx
# Quando houver domínio + HTTPS, migrar para nginx/oriens.conf (server_name real + certbot).

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Cache de estático decidido pela querystring:
#   com ?v=<sha>  → a URL é única por build → pode congelar (immutable).
#   sem ?v=       → URL estável → NUNCA congelar. Era o bug: `expires 30d immutable`
#                   valia também p/ /static/css/theme.css sem versão, prendendo o
#                   asset antigo no navegador por 30 dias (site velho até Ctrl+F5).
map $arg_v $static_cache {
    ""      "no-cache";
    default "public, max-age=31536000, immutable";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;

    # gzip no contexto server (o nginx.conf padrão do Ubuntu já tem `gzip on`
    # no http{} — redeclarar lá duplica e quebra o nginx -t).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/manifest+json image/svg+xml font/woff2;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Service worker legado (escopo /static/, nunca controlou página nenhuma).
    # O arquivo foi removido → 404 com no-store, que é justamente o que faz o
    # navegador desregistrar o SW órfão sozinho. Jamais cachear script de SW.
    location = /static/sw.js {
        alias /opt/oriens/app/static/sw.js;
        expires off;
        add_header Cache-Control "no-store" always;
    }

    # Estáticos direto do disco. Cache longo SÓ para URL versionada (ver map acima).
    location /static/ {
        alias /opt/oriens/app/static/;
        access_log off;
        expires off;                                    # senão o módulo expires emite um 2º Cache-Control
        add_header Cache-Control $static_cache always;  # header ÚNICO, decidido pelo map
        add_header X-Content-Type-Options nosniff always;
    }

    # Login com rate limit (5 req/min por IP; burst de 5 sem atraso).
    location = /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
