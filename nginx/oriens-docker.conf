# nginx/oriens-docker.conf
# Nginx DENTRO do docker-compose de produção (serviço `nginx`).
# Montado em /etc/nginx/conf.d/default.conf. Proxy para o serviço `app` (rede do compose).
# Estáticos servidos direto do bind mount ./app/static -> /static (read-only).
#
# Cache de estáticos em 1h por enquanto — sobe para 30d/immutable quando o
# cache-busting por versão (?v=APP_VERSION) entrar (Fase 5 do refactor).

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Compressão de respostas dinâmicas (HTML/HTMX/JSON) e assets texto.
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_types text/plain text/css text/javascript application/javascript
           application/json application/manifest+json image/svg+xml font/woff2;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Permite upload de anexos maiores (limite do app é 20MB).
    client_max_body_size 20M;

    # Headers de segurança básicos.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Estáticos direto do disco (tira o Python do caminho dos assets).
    location /static/ {
        alias /static/;
        expires 1h;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options nosniff always;
    }

    # Login com rate limit (5 req/min por IP; burst de 5 sem atraso).
    location = /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a HTMX/SSE e conexões longas
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
