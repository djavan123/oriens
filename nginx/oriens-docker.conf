# nginx/oriens-docker.conf
# Nginx DENTRO do docker-compose de produção (serviço `nginx`).
# Montado em /etc/nginx/conf.d/default.conf. Proxy para o serviço `app` (rede do compose).
# Estáticos servidos direto do bind mount ./app/static -> /static (read-only).
#
# Cache de estáticos: longo SÓ para URL versionada (?v=APP_VERSION). Sem versão,
# revalida sempre — congelar URL estável prende o asset antigo no navegador.

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

map $arg_v $static_cache {
    ""      "no-cache";
    default "public, max-age=31536000, immutable";
}

# Compressão de respostas dinâmicas (HTML/HTMX/JSON) e assets texto.
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_types text/plain text/css text/javascript application/javascript
           application/json application/manifest+json image/svg+xml font/woff2;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Permite upload de anexos maiores (limite do app é 20MB).
    client_max_body_size 20M;

    # Headers de segurança básicos.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Service worker legado (arquivo removido → 404 com no-store, que desregistra
    # o SW órfão no navegador). Script de SW jamais pode ser cacheado.
    location = /static/sw.js {
        alias /static/sw.js;
        expires off;
        add_header Cache-Control "no-store" always;
    }

    # Estáticos direto do disco (tira o Python do caminho dos assets).
    # Cache longo SÓ para URL versionada (ver map acima).
    location /static/ {
        alias /static/;
        access_log off;
        expires off;                                    # senão o módulo expires emite um 2º Cache-Control
        add_header Cache-Control $static_cache always;  # header ÚNICO, decidido pelo map
        add_header X-Content-Type-Options nosniff always;
    }

    # Login com rate limit (5 req/min por IP; burst de 5 sem atraso).
    location = /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a HTMX/SSE e conexões longas
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
