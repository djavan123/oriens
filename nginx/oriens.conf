# /etc/nginx/sites-available/oriens
# Proxy reverso -> container do app em 127.0.0.1:8000
# Troque "seudominio.com.br" pelo seu domínio real.
# O bloco 443 (TLS) é adicionado automaticamente pelo certbot --nginx.

server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Permite upload de anexos maiores (ajuste se precisar).
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a HTMX/SSE e conexões longas
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
