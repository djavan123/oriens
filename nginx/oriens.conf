# /etc/nginx/sites-available/oriens
# Proxy reverso -> container do app em 127.0.0.1:8000
# Troque "seudominio.com.br" pelo seu domínio real.
# O bloco 443 (TLS) é adicionado automaticamente pelo certbot --nginx.

# Rate limit do login (defesa contra credential stuffing). Zona compartilhada
# entre workers do nginx — robusto mesmo com o app rodando vários workers.
# Definir no contexto http (arquivos de site são incluídos dentro de http{}).
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Permite upload de anexos maiores (ajuste se precisar).
    client_max_body_size 20M;

    # Estáticos servidos direto pelo nginx (tira o Python do caminho dos assets).
    # `alias` aponta para o repo na VPS; ajuste o caminho se o seu for diferente.
    location /static/ {
        alias /opt/oriens/app/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Login com rate limit (5 req/min por IP; burst de 5 sem atraso).
    location = /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a HTMX/SSE e conexões longas
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
