# docker-compose.prod.yml — PRODUÇÃO (PostgreSQL)
# Subir com:  docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: oriens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oriens -d oriens"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        # Cache-busting dos estáticos/PWA. Deploy recomendado:
        #   APP_VERSION=$(git rev-parse --short HEAD) docker compose -f docker-compose.prod.yml up -d --build
        APP_VERSION: ${APP_VERSION:-prod}
    restart: always
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persiste os anexos enviados (gravados em /app/data/attachments).
      - appdata:/app/data
    ports:
      # Só loopback: todo o tráfego externo passa pelo nginx (porta 80) —
      # rate-limit, gzip e cache de estáticos valem para 100% das requisições.
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Proxy reverso EM CONTAINER — OPT-IN (profile "nginx"): a VPS atual já roda
  # nginx no host (sites-enabled/oriens), que ocupa a porta 80. Use este serviço
  # apenas em ambientes SEM nginx no host:
  #   docker compose -f docker-compose.prod.yml --profile nginx up -d
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/oriens-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/static:ro
    depends_on:
      - app

  # Processo de fundo (lembretes + captura Telegram). ÚNICO — não escalar.
  # Mantém o web livre para rodar com múltiplos workers sem duplicar envios.
  worker:
    build: .
    restart: always
    command: python -m app.worker
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Falha se o heartbeat em app_state estiver >5 min velho (loop travado).
      test: ["CMD", "python", "scripts/worker_health.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  appdata:
