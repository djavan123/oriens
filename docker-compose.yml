# docker-compose.yml — AMBIENTE DE DESENVOLVIMENTO (SQLite + hot reload)
# Produção: use docker-compose.prod.yml
services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file: .env

volumes:
  sqlite_data:
