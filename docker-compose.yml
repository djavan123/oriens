# docker-compose.yml — AMBIENTE DE DESENVOLVIMENTO (SQLite + hot reload)
# Produção: use docker-compose.prod.yml
services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      TZ: America/Sao_Paulo
    env_file: .env

  # Processo de fundo (lembretes + captura Telegram). Separado do web para que o
  # web possa rodar com múltiplos workers sem duplicar envios.
  worker:
    build: .
    command: python -m app.worker
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      TZ: America/Sao_Paulo
    env_file: .env
    depends_on:
      - app

volumes:
  sqlite_data:
