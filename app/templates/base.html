<!DOCTYPE html>
<html lang="pt-BR" x-data="{ theme: localStorage.getItem('oriens-theme') || 'dark' }"
  x-init="$watch('theme', v => { localStorage.setItem('oriens-theme', v); document.documentElement.setAttribute('data-theme', v) })">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Oriens{% endblock %}</title>

  <!-- Tema: aplica data-theme antes de qualquer CSS para não piscar -->
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('oriens-theme')||'dark')}catch(e){document.documentElement.setAttribute('data-theme','dark')}})();</script>
  <link rel="stylesheet" href="/static/css/theme.css?v={{ app_version }}">

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.webmanifest?v={{ app_version }}">
  <meta name="theme-color" content="#191919">
  <link rel="icon" href="/static/icon.svg?v={{ app_version }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg?v={{ app_version }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oriens">
  <meta name="mobile-web-app-capable" content="yes">

  <script src="/static/vendor/tailwind.js?v={{ app_version }}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'oriens-bg':         'var(--oriens-bg)',
            'oriens-sidebar':    'var(--oriens-sidebar)',
            'oriens-surface':    'var(--oriens-surface)',
            'oriens-card':       'var(--oriens-card)',
            'oriens-card-hover': 'var(--oriens-card-hover)',
            'oriens-border':     'var(--oriens-border)',
            'oriens-divider':    'var(--oriens-divider)',
            'oriens-primary':    'var(--oriens-primary)',
            'oriens-secondary':  'var(--oriens-secondary)',
            'oriens-tertiary':   'var(--oriens-tertiary)',
            'oriens-muted':      'var(--oriens-muted)',
            'oriens-empty':      'var(--oriens-empty)',
            'oriens-accent':     'var(--oriens-accent)',
            'oriens-accent-hover':'var(--oriens-accent-hover)',
            'oriens-accent-text':'var(--oriens-accent-text)',
            'oriens-link':       'var(--oriens-link)',
            'oriens-btn':        'var(--oriens-btn)',
            'oriens-alert':      'var(--oriens-alert)',
            'oriens-success':    'var(--oriens-success)',
            'oriens-warning':    'var(--oriens-warning)',
            'oriens-urgent':     'var(--oriens-urgent)',
            'oriens-today':      'var(--oriens-today)',
            'oriens-ok':         'var(--oriens-ok)',
          },
          fontFamily: {
            sans: [
              '"Inter"',
              'ui-sans-serif',
              '-apple-system',
              'BlinkMacSystemFont',
              '"Segoe UI"',
              'Ubuntu',
              '"Helvetica Neue"',
              'sans-serif',
            ],
          }
        }
      }
    }
  </script>
  <!-- Fonte Inter auto-hospedada (sem CDN — PWA funciona offline) -->
  <link href="/static/vendor/fonts/inter.css?v={{ app_version }}" rel="stylesheet">

  <script src="/static/vendor/htmx.min.js?v={{ app_version }}" defer></script>
  <script src="/static/vendor/alpine.min.js?v={{ app_version }}" defer></script>

  <style>
    :root {
      --font-base: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, "Helvetica Neue", sans-serif;

      /* RAIOS (as cores vêm de theme.css, por data-theme) */
      --radius-card: 10px;
      --radius-col:  12px;
    }

    body {
      font-family: var(--font-base);
      background: var(--bg-app);
      color: var(--text-primary);
      font-size: 14px;
    }

    * { box-sizing: border-box; }
    input, textarea, select { color-scheme: dark; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-app); }
    ::-webkit-scrollbar-thumb { background: var(--oriens-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }

    /* CARTÃO */
    .card {
      background: var(--bg-card);
      border: var(--border-default);
      border-radius: var(--radius-card);
      padding: 12px 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover {
      background: var(--bg-card-hover);
      border: var(--border-hover);
    }
    .card-title {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
    }
    .card-meta {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    /* COLUNA KANBAN */
    .column {
      background: var(--bg-card);
      border-radius: var(--radius-col);
      padding: 10px 8px;
    }
    .column-title {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--oriens-border);
    }

    /* NAV ITEMS */
    .nav-item {
      display: flex;
      align-items: center;
      color: var(--text-tertiary);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: var(--bg-surface);
      color: var(--text-primary);
      font-weight: 500;
    }

    /* BOTÃO PRIMÁRIO */
    .btn-primary {
      background: var(--accent);
      color: var(--oriens-accent-text);
      border: none;
      border-radius: 7px;
      padding: 9px 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 14px;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }

    /* LABEL DE SEÇÃO (ex: "MARCOS", "RISCOS", "ANEXOS", "TAREFAS") */
    .section-label {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* TEXTO NEUTRO AUXILIAR (ex: "Criado em", "Nenhum arquivo selecionado") */
    .text-neutral {
      color: var(--text-tertiary);
    }

    /* LINK / AÇÃO REAL (ex: "active", "Editar →", "+ registrar risco") */
    .text-link {
      color: var(--link);
      cursor: pointer;
    }

    /* ESTADO VAZIO (ex: "Nenhuma decisão registrada.") */
    .text-empty {
      color: var(--text-empty);
      font-style: italic;
    }

    /* TAREFA SENDO CONCLUÍDA — feedback de fade + strikethrough antes de sair da lista */
    .task-completing {
      opacity: .35;
      transition: opacity .4s ease;
    }
    .task-completing p {
      text-decoration: line-through;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="antialiased min-h-screen">

  {% block body %}{% endblock %}

  <script>
    // Registro do service worker (PWA). Só em contexto seguro (HTTPS ou localhost).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        // ?v= muda a URL do SW a cada build → o browser re-instala e o cache antigo
        // é limpo no activate (cache-busting sem bump manual de versão no sw.js).
        navigator.serviceWorker.register("/static/sw.js?v={{ app_version }}").catch(function () {});
      });
    }
  </script>
</body>
</html>
