<form
  id="new-task-form"
  hx-post="/api/tasks"
  {% if project_id %}
  hx-target="#task-list-pending"
  hx-swap="beforeend"
  hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('HX-Retarget')){ $el.reset(); document.getElementById('task-form-error').innerHTML=''; var np=document.getElementById('no-pending'); if(np) np.remove(); }"
  {% else %}
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('HX-Retarget')){ $el.reset(); var er=document.getElementById('task-form-error'); if(er) er.innerHTML=''; htmx.trigger(document.body,'refreshPriorities'); }"
  {% endif %}
  class="space-y-2">

  {% if project_id %}
  <input type="hidden" name="project_id" value="{{ project_id }}">
  {% endif %}

  <div id="task-form-error"></div>

  <div class="flex items-center gap-2">
    <input
      type="text"
      name="title"
      id="new-task-input"
      required
      placeholder="Criar, revisar, escrever..."
      class="flex-1 bg-oriens-card border border-oriens-border text-oriens-primary rounded-md px-3 py-2 text-sm focus:outline-none focus:border-oriens-accent transition-colors placeholder-oriens-muted">
    <button type="submit"
      class="bg-oriens-btn hover:bg-oriens-accent-hover text-white rounded-md px-4 py-2 text-sm font-semibold transition-colors flex-shrink-0">
      +
    </button>
  </div>

  {# Tarefa avulsa (sem projeto): contexto obrigatório + prioridade Alta/Média/Baixa (SCRIPT 13) #}
  {% if not project_id %}
  <div class="grid grid-cols-2 gap-2">
    <select name="context_id" required
      class="bg-oriens-card border border-oriens-border text-oriens-primary rounded-md px-2 py-2 text-sm focus:outline-none focus:border-oriens-accent transition-colors">
      <option value="" disabled {% if not active_context_id %}selected{% endif %}>Contexto...</option>
      {% for ctx in all_contexts %}
      <option value="{{ ctx.id }}" {% if active_context_id and ctx.id == active_context_id %}selected{% endif %}>{{ ctx.name }}</option>
      {% endfor %}
    </select>
    <select name="prioridade"
      class="bg-oriens-card border border-oriens-border text-oriens-primary rounded-md px-2 py-2 text-sm focus:outline-none focus:border-oriens-accent transition-colors">
      <option value="alta">Alta</option>
      <option value="media" selected>Média</option>
      <option value="baixa">Baixa</option>
    </select>
  </div>
  {% endif %}

</form>
