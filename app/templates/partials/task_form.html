<form
  id="new-task-form"
  hx-post="/api/tasks"
  hx-target="#task-list-pending"
  hx-swap="beforeend"
  hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('HX-Retarget')){ $el.reset(); document.getElementById('task-form-error').innerHTML=''; var np=document.getElementById('no-pending'); if(np) np.remove(); }"
  class="space-y-2">

  {% if project_id %}
  <input type="hidden" name="project_id" value="{{ project_id }}">
  {% endif %}

  <div id="task-form-error"></div>

  <div class="flex items-center gap-2">
    <input
      type="text"
      name="title"
      id="new-task-input"
      required
      placeholder="Criar, revisar, escrever..."
      class="flex-1 bg-oriens-card border border-oriens-border text-oriens-primary rounded-md px-3 py-2 text-sm focus:outline-none focus:border-oriens-accent transition-colors placeholder-oriens-muted">
    <button type="submit"
      class="bg-oriens-btn hover:bg-oriens-accent-hover text-white rounded-md px-4 py-2 text-sm font-semibold transition-colors flex-shrink-0">
      +
    </button>
  </div>

  {% if criterios is defined and criterios %}
  <div class="mt-1 space-y-3 bg-oriens-card border border-oriens-border rounded-md px-3 py-3">
    <p class="text-oriens-secondary text-[11px] font-bold tracking-wide uppercase">Importância — todos obrigatórios</p>
    {% include "partials/criterio_selector.html" %}
  </div>
  {% endif %}

</form>
