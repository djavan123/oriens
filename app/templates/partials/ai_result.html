<div class="mt-3 space-y-1.5">
  {% if label %}
  <p class="text-oriens-secondary text-[11px] font-bold uppercase tracking-wide mb-2">{{ label }}</p>
  {% endif %}
  {% for item in items %}
  <div class="flex items-start gap-2 py-0.5">
    <span class="text-oriens-link text-xs mt-0.5 flex-shrink-0">→</span>
    <span class="text-oriens-primary text-sm leading-snug">{{ item }}</span>
  </div>
  {% endfor %}
</div>
