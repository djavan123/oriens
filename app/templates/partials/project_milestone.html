<div id="milestone-{{ m.id }}"
     class="group flex items-center gap-3 py-3 border-b border-oriens-divider last:border-0">
  <button
    hx-patch="/api/projects/{{ m.project_id }}/milestones/{{ m.id }}"
    hx-target="#milestone-{{ m.id }}"
    hx-swap="outerHTML"
    title="{% if m.done %}Reabrir{% else %}Concluir{% endif %}"
    class="flex-shrink-0 w-4 h-4 rounded border transition-colors flex items-center justify-center
      {% if m.done %}border-oriens-success bg-oriens-success/20{% else %}border-oriens-border hover:border-oriens-accent{% endif %}">
    {% if m.done %}
    <svg class="w-2.5 h-2.5 text-oriens-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
    </svg>
    {% endif %}
  </button>

  <div class="flex-1 min-w-0">
    <p class="text-sm leading-snug {% if m.done %}text-oriens-secondary line-through{% else %}text-oriens-primary{% endif %}">
      {{ m.title }}
    </p>
    {% if m.due_date %}
    <span class="text-xs {% if m.due_date.date() < now().date() and not m.done %}text-oriens-alert{% else %}text-oriens-muted{% endif %}">
      {{ m.due_date.strftime('%d/%m/%y') }}
    </span>
    {% endif %}
  </div>

  <button
    hx-delete="/api/projects/{{ m.project_id }}/milestones/{{ m.id }}"
    hx-target="#milestone-{{ m.id }}"
    hx-swap="outerHTML"
    hx-confirm="Remover marco?"
    title="Remover"
    class="flex-shrink-0 text-oriens-secondary text-xs opacity-0 group-hover:opacity-100 hover:text-oriens-alert transition-all">
    ✕
  </button>
</div>
