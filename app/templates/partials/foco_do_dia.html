{# Foco do dia. Vazio = compacto e discreto; preenchido = card com borda accent. #}
<div id="foco-card" x-data="{ editing: false }" class="mb-6">

  {% if user.foco_do_dia %}
  <!-- Preenchido: destaque -->
  <div class="rounded-xl bg-oriens-surface px-5 py-4" style="border: 1px solid var(--oriens-accent);">
    <div class="flex items-start gap-3">
      <div class="flex-1 min-w-0">
        <p class="text-oriens-secondary text-[11px] font-bold tracking-wide uppercase mb-1">Foco do dia</p>
        <div x-show="!editing" class="flex items-start gap-2">
          <p class="text-oriens-primary text-sm flex-1 whitespace-pre-wrap leading-relaxed">{{ user.foco_do_dia }}</p>
          <button @click="editing = true; $nextTick(() => $refs.inp.focus())"
            title="Editar foco" class="text-oriens-secondary hover:text-oriens-accent text-xs flex-shrink-0 transition-colors">editar</button>
        </div>
        {% include "partials/_foco_form.html" %}
      </div>
    </div>
  </div>

  {% else %}
  <!-- Vazio: compacto -->
  <div x-show="!editing">
    <button @click="editing = true; $nextTick(() => $refs.inp.focus())"
      class="text-oriens-secondary text-sm hover:text-oriens-primary transition-colors">
      Definir foco do dia
    </button>
  </div>
  <div class="rounded-lg bg-oriens-surface border border-oriens-border px-4 py-3" x-show="editing" style="display:none">
    <p class="text-oriens-secondary text-[11px] font-bold tracking-wide uppercase mb-1.5">Foco do dia</p>
    {% include "partials/_foco_form.html" %}
  </div>
  {% endif %}

</div>
