<div id="capture-{{ capture.id }}"
     class="group flex items-center gap-3 px-3 py-2.5 border-b border-oriens-divider last:border-b-0 hover:bg-oriens-card-hover transition-colors">

  <!-- Checkbox de resolução -->
  <button
    hx-patch="/api/capture/{{ capture.id }}/resolve"
    hx-target="#capture-{{ capture.id }}"
    hx-swap="outerHTML"
    title="Marcar como resolvido"
    class="flex-shrink-0 w-4 h-4 rounded-full border border-oriens-border hover:border-oriens-accent transition-colors bg-transparent cursor-pointer"></button>

  <!-- Texto -->
  <span class="flex-1 text-sm text-oriens-primary leading-snug min-w-0">{{ capture.content }}</span>

  <!-- Data -->
  <span class="flex-shrink-0 text-[11px] text-oriens-muted">{{ capture.created_at.strftime('%d/%m %H:%M') }}</span>

  <!-- Ações (hover) -->
  <div class="flex items-center gap-3 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
    <a href="/process"
       class="text-[11px] text-oriens-accent hover:opacity-70 transition-opacity whitespace-nowrap">
      processar →
    </a>
    <button
      hx-patch="/api/capture/{{ capture.id }}/discard"
      hx-target="#capture-{{ capture.id }}"
      hx-swap="outerHTML"
      title="Mover para lixeira"
      class="text-[11px] text-oriens-secondary hover:text-oriens-urgent transition-colors cursor-pointer">
      lixeira
    </button>
  </div>

</div>
