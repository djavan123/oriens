<div id="capture-{{ capture.id }}"
     class="group flex items-start gap-3 px-3 py-2.5 border-b border-oriens-divider hover:bg-oriens-card-hover rounded-md transition-colors">

  <div class="flex-1 min-w-0">
    <p class="text-sm leading-snug
      {% if capture.processed %}line-through text-oriens-empty{% else %}text-oriens-primary{% endif %}">
      {{ capture.content }}
    </p>
  </div>

  <div class="flex items-center gap-3 flex-shrink-0 mt-0.5">
    <span class="text-[11px] text-oriens-muted">{{ capture.created_at.strftime('%d/%m %H:%M') }}</span>
    {% if not capture.processed %}
    <a href="/process"
      class="text-oriens-link text-xs opacity-0 group-hover:opacity-100 transition-opacity hover:opacity-80">
      processar →
    </a>
    {% else %}
    <span class="text-[11px] text-oriens-empty">processado</span>
    {% endif %}
  </div>

</div>
