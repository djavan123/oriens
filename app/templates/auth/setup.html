{% extends "base.html" %}
{% block title %}Oriens — Configuração inicial{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="mb-10 text-center">
      <h1 class="text-oriens-primary text-2xl font-bold tracking-[0.25em] uppercase">Oriens</h1>
      <p class="text-oriens-secondary text-xs mt-2 tracking-wider">Primeira execução — crie sua conta</p>
    </div>

    <div class="bg-oriens-surface border border-oriens-border rounded-xl p-8">

      {% if error %}
      <div class="mb-5 text-oriens-alert text-sm bg-oriens-alert/10 border border-oriens-alert/30 rounded-lg px-4 py-3">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/setup" class="space-y-5">
        <div>
          <label class="block text-oriens-secondary text-xs font-medium uppercase tracking-wider mb-2">Nome</label>
          <input
            type="text"
            name="name"
            required
            autofocus
            autocomplete="name"
            class="w-full bg-oriens-card border border-oriens-border text-oriens-primary rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-oriens-accent transition-colors">
        </div>

        <div>
          <label class="block text-oriens-secondary text-xs font-medium uppercase tracking-wider mb-2">Email</label>
          <input
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full bg-oriens-card border border-oriens-border text-oriens-primary rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-oriens-accent transition-colors">
        </div>

        <div>
          <label class="block text-oriens-secondary text-xs font-medium uppercase tracking-wider mb-2">Senha</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="new-password"
            minlength="8"
            class="w-full bg-oriens-card border border-oriens-border text-oriens-primary rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-oriens-accent transition-colors">
        </div>

        <button
          type="submit"
          class="w-full bg-oriens-btn hover:bg-oriens-accent-hover text-white rounded-md px-4 py-3 text-sm font-semibold transition-colors mt-2">
          Criar conta e entrar
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
